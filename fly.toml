# fly.toml app configuration file generated for all-telegram-bots on 2026-04-18T12:49:01-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'all-telegram-bots'
primary_region = 'dfw'

[build]

[processes]
  app = 'python main.py'

[deploy]
  strategy = "immediate"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[mounts]]
  source      = "austin311_data"
  destination = "/data"

